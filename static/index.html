<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHarvester 控制台</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>🌐 WebHarvester 可视化面板</h1>
  <div class="tabs" id="tabNav">
    <button class="tab active" onclick="switchTab('tab-collect')">采集任务</button>
    <button class="tab" onclick="switchTab('tab-sessions')">会话管理</button>
    <button class="tab" onclick="switchTab('tab-analyze')">结果分析</button>
    <button class="tab" onclick="switchTab('tab-health')">服务状态</button>
  </div>

  <!-- Tab 1: 采集任务 -->
  <div id="tab-collect" class="tab-content active">
    <h2>📌 采集任务</h2>
    <div class="form-row">
      <label>站点：</label>
      <select id="collectSite" onchange="onSiteChange()">
        <option value="xiaohongshu">小红书</option>
        <option value="zhihu">知乎</option>
        <option value="bilibili">B站</option>
      </select>
      <label>会话：</label>
      <select id="profileSelect"><option value="">不使用登录状态</option></select>
      <label>认证：</label>
      <select id="authModeSelect"><option value="logged_in">已登录</option><option value="guest">游客</option></select>
    </div>
    <h3>选择要采集的内容</h3>
    <div id="unitCheckboxes" class="card-grid"></div>
    <div id="paramInputs" style="margin-top:12px;"></div>
    <button onclick="startUnitCollect()" style="margin-top:8px;">🚀 开始组合采集</button>
    <h3>结果</h3>
    <div id="collectResult"></div>
  </div>

  <!-- Tab 2: 会话管理 -->
  <div id="tab-sessions" class="tab-content">
    <h2>🔐 会话管理</h2>
    <button onclick="loadSessionCards()">🔄 刷新</button>
    <div id="sessionCards" class="card-grid"></div>
  </div>

  <!-- Tab 3: 结果分析 -->
  <div id="tab-analyze" class="tab-content">
    <h2>📊 结果分析</h2>
    <div class="form-row">
      <select id="resultSelect" style="flex:1;"><option value="">-- 选择结果文件 --</option></select>
      <button onclick="loadResultFiles()">🔄 刷新</button>
    </div>
    <div id="resultDetail"><p style="color:#888;">选择文件后自动加载</p></div>
  </div>

  <!-- Tab 4: 服务状态 -->
  <div id="tab-health" class="tab-content">
    <h2>📊 服务状态</h2>
    <div id="healthDisplay"><p>加载中...</p></div>
    <p><button onclick="fetchHealth()">🔄 刷新</button> 每 10 秒自动刷新</p>
  </div>

  <pre id="logBox" class="log-box"></pre>
  <script src="/api.js"></script>
</body>
</html>
