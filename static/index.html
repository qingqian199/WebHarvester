<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>WebHarvester 控制台</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>🌐 WebHarvester 可视化面板</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('tab-run')">快速采集</button>
    <button class="tab" onclick="switchTab('tab-batch')">批量任务</button>
    <button class="tab" onclick="switchTab('tab-login')">登录管理</button>
    <button class="tab" onclick="switchTab('tab-analyze')">分析报告</button>
    <button class="tab" onclick="switchTab('tab-health')">服务状态</button>
  </div>

  <div id="tab-run" class="tab-content active">
    <h2>快速采集</h2>
    <input id="urlInput" placeholder="https://example.com" />
    <select id="profileSelect"><option value="">不使用登录状态</option></select>
    <button onclick="runSingle()">开始采集</button>
  </div>

  <div id="tab-batch" class="tab-content">
    <h2>批量任务</h2>
    <button onclick="runBatch()">执行 tasks.json</button>
  </div>

  <div id="tab-login" class="tab-content">
    <h2>登录管理</h2>
    <input id="profileNameLogin" placeholder="会话名称" />
    <input id="loginUrlInput" placeholder="登录页 URL" />
    <input id="verifyUrlInput" placeholder="验证登录的 URL" />
    <button onclick="startLogin()">启动登录</button>
    <h3>已有会话</h3>
    <ul id="profileList"></ul>
    <button onclick="loadProfiles()">刷新列表</button>
  </div>

  <div id="tab-analyze" class="tab-content">
    <h2>分析已有结果</h2>
    <input id="analyzePath" placeholder="output/xxx/harvest-xxx.json" />
    <button onclick="analyzeResult()">生成报告</button>
    <iframe id="reportFrame" style="display:none; width:100%; height:500px;"></iframe>
  </div>

  <div id="tab-health" class="tab-content">
    <h2>📊 服务状态</h2>
    <div id="healthDisplay">
      <p>加载中...</p>
    </div>
    <p><button onclick="fetchHealth()">🔄 刷新</button> 每 10 秒自动刷新</p>
  </div>

  <pre id="logBox" class="log-box"></pre>
  <script src="/api.js"></script>
</body>
</html>
