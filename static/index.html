<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebHarvester 控制台</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>🌐 WebHarvester 可视化面板</h1>
  <div class="tabs" id="tabNav">
    <button class="tab active" onclick="switchTab('tab-collect')">采集任务</button>
    <button class="tab" onclick="switchTab('tab-sessions')">会话管理</button>
    <button class="tab" onclick="switchTab('tab-analyze')">结果分析</button>
    <button class="tab" onclick="switchTab('tab-health')">服务状态</button>
  </div>

  <!-- Tab 1: 采集任务 -->
  <div id="tab-collect" class="tab-content active">
    <h2>📌 采集任务</h2>
    <div class="form-row">
      <label>采集模式：</label>
      <select id="collectMode"><option value="generic">通用探测</option><option value="crawler">特化采集</option></select>
    </div>
    <div class="form-row" id="crawlerSelectRow" style="display:none;">
      <label>站点：</label>
      <select id="crawlerSelect"></select>
    </div>
    <div class="form-row">
      <input id="urlInput" placeholder="https://example.com" style="flex:1;" />
      <select id="profileSelect"><option value="">不使用登录状态</option></select>
      <button onclick="startCollect()">开始采集</button>
    </div>
    <h3>进行中</h3>
    <ul id="taskList"><li style="color:#888;">暂无任务</li></ul>
  </div>

  <!-- Tab 2: 会话管理 -->
  <div id="tab-sessions" class="tab-content">
    <h2>🔐 会话管理</h2>
    <button onclick="loadSessionCards()">🔄 刷新</button>
    <div id="sessionCards" class="card-grid"></div>
  </div>

  <!-- Tab 3: 结果分析 -->
  <div id="tab-analyze" class="tab-content">
    <h2>📊 结果分析</h2>
    <div class="form-row">
      <select id="resultSelect" style="flex:1;"><option value="">-- 选择结果文件 --</option></select>
    </div>
    <div id="resultDetail"></div>
  </div>

  <!-- Tab 4: 服务状态 -->
  <div id="tab-health" class="tab-content">
    <h2>📊 服务状态</h2>
    <div id="healthDisplay"><p>加载中...</p></div>
    <p><button onclick="fetchHealth()">🔄 刷新</button> 每 10 秒自动刷新</p>
  </div>

  <pre id="logBox" class="log-box"></pre>
  <script src="/api.js"></script>
</body>
</html>
